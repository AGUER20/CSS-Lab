<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Corner | Contact Us</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fef7e8;
            color: #3a2010;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        
        header {
            background-color: #8b5a2b;
            color: white;
            padding: 28px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2rem;
            letter-spacing: 0.5px;
        }

        
        nav {
            background-color: #6b3e1a;
            padding: 12px 20px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        nav a:hover {
            opacity: 0.75;
        }

        
        main {
            flex: 1;
            padding: 40px 20px 60px;
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
        }

        
        .contact-info {
            background-color: #e2c7a1;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 36px;
            border-left: 5px solid #8b5a2b;
        }
        .contact-info h3 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: #5a2e0a;
        }
        .contact-info p {
            margin-bottom: 6px;
            line-height: 1.6;
        }

        
        .form-section h3 {
            font-size: 1.2rem;
            margin-bottom: 18px;
            color: #5a2e0a;
        }

        form {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(139, 90, 43, 0.12);
            width: 100%;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #5a2e0a;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 20px;
            border: 1.5px solid #c49a6c;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: Arial, sans-serif;
            background-color: #fffdf8;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus,
        textarea:focus,
        select:focus {
            border-color: #8b5a2b;
            background-color: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 11px 26px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: background-color 0.2s, opacity 0.2s;
        }
        button[type="submit"] {
            background-color: #8b5a2b;
            color: white;
        }
        button[type="submit"]:hover {
            background-color: #6b3e1a;
        }
        button[type="reset"] {
            background-color: #e2c7a1;
            color: #5a2e0a;
        }
        button[type="reset"]:hover {
            background-color: #cdb08a;
        }

        
        footer {
            background-color: #8b5a2b;
            color: white;
            text-align: center;
            padding: 16px 20px;
        }

        
        @media (max-width: 600px) {
            header h1 { font-size: 1.4rem; }
            nav a { margin: 0 8px; font-size: 0.85rem; }
            form { padding: 20px 16px; }
            .btn-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>📞 Contact Cozy Corner</h1>
</header>

<nav>
    <a href="index.html">🏠 Home</a>
    <a href="catalog.html">📖 Book Catalog</a>
    <a href="contact.html">📞 Contact Us</a>
</nav>

<main>
    <div class="contact-info">
        <h3>📍 Visit our shop</h3>
        <p>31 Mugumo Road, Nairobi, Kenya</p>
        <p>📞 Phone: +254 711 890 836</p>
        <p>✉️ Email: hello@cozycornerbooks.com</p>
    </div>

    <div class="form-section">
        <h3>📝 Quick order / Ask a question</h3>
        <form action="#" method="post">
            <label for="name">Full name:</label>
            <input type="text" id="name" name="name" placeholder="e.g. Jane Wanjiku" required>

            <label for="email">Email address:</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="book-choice">Which book interests you?</label>
            <select id="book-choice" name="book">
                <option value="">— Select a book —</option>
                <option value="1984">1984 – George Orwell</option>
                <option value="pride">Pride and Prejudice – Jane Austen</option>
                <option value="hobbit">The Hobbit – J.R.R. Tolkien</option>
            </select>

            <label for="message">Your message / order details:</label>
            <textarea id="message" name="message" rows="4" placeholder="I would like to reserve..."></textarea>

            <div class="btn-group">
                <button type="submit">Send message</button>
                <button type="reset">Clear form</button>
            </div>
        </form>
    </div>
</main>

<footer>
    <p>✨ Come for the books, stay for the stories ✨</p>
</footer>

</body>
</html>
